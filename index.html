<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Metas de Vida</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ===== Seção Principal ===== -->
    <section class="conteudo-principal">

        <!-- Título principal -->
        <h1 class="titulo-principal">🌟 Minhas Metas de Vida</h1>

        <!-- Conteúdo -->
        <div class="conteudo">

            <!-- Botões das abas -->
            <div class="botoes">
                <button class="botao ativo">🎓 Concluir os Estudos</button>
                <button class="botao">✈️ Fazer uma Viagem</button>
                <button class="botao">📚 Entrar na Faculdade</button>
                <button class="botao">🚗 Tirar a CNH</button>
            </div>

            <!-- Abas de conteúdo -->
            <div class="abas-textos">

                <!-- Aba 1 -->
                <div class="aba-conteudo ativo">
                    <h2 class="aba-conteudo-titulo-principal">🎓 Concluir os Estudos</h2>
                    <p class="aba-conteudo-titulo-secundario">Tempo restante para alcançar esta meta:</p>
                    <div class="contador"></div>
                </div>

                <!-- Aba 2 -->
                <div class="aba-conteudo">
                    <h2 class="aba-conteudo-titulo-principal">✈️ Fazer uma Viagem</h2>
                    <p class="aba-conteudo-titulo-secundario">Tempo restante para alcançar esta meta:</p>
                    <div class="contador"></div>
                </div>

                <!-- Aba 3 -->
                <div class="aba-conteudo">
                    <h2 class="aba-conteudo-titulo-principal">📚 Entrar na Faculdade</h2>
                    <p class="aba-conteudo-titulo-secundario">Tempo restante para alcançar esta meta:</p>
                    <div class="contador"></div>
                </div>

                <!-- Aba 4 -->
                <div class="aba-conteudo">
                    <h2 class="aba-conteudo-titulo-principal">🚗 Tirar a CNH</h2>
                    <p class="aba-conteudo-titulo-secundario">Tempo restante para alcançar esta meta:</p>
                    <div class="contador"></div>
                </div>

            </div>

        </div>

    </section>

    <!-- Script JS -->
    <script src="main.js"></script>

</body>

</html>
